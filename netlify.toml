# ==============================================================================
# Configuration de Déploiement Netlify - Alpha Prefac (TanStack Start / Vite SSR)
# ==============================================================================

# 1. PARAMÈTRES DE CONSTRUCTION (BUILD)
# Le projet utilise Vite / TanStack Start en mode SSR/Hybride.
# Le build produit les fichiers statiques dans "dist/client" et le bundle serveur dans "dist/server".
# Pour un déploiement statique Netlify, nous servons uniquement le dossier "dist/client".
[build]
  command = "npm run build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "20"

# 2. RÈGLES DE REDIRECTION (ROUTING FALLBACK)
# Redirection SPA classique pour que le routeur côté client (TanStack Router) gère le routage de l'app.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# 3. ENTÊTES DE SÉCURITÉ ET OPTIMISATION DE CACHE (HEADERS)
# Mise en cache agressive des éléments statiques immuables compilés par Vite
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache pour les polices Web
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Entêtes globaux de sécurité pour toutes les requêtes HTML
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

